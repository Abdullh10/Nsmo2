<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسئلة الغازات — مستوى الأولمبياد الكيميائي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface2: #f5f6fa;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.18);
    --accent: #5b4de8;
    --accent-glow: rgba(91,77,232,0.15);
    --accent-soft: rgba(91,77,232,0.07);
    --teal: #0d9e72;
    --teal-soft: rgba(13,158,114,0.08);
    --amber: #b87000;
    --amber-soft: rgba(184,112,0,0.08);
    --red: #d63031;
    --red-soft: rgba(214,48,49,0.07);
    --green: #1e8a3c;
    --green-soft: rgba(30,138,60,0.07);
    --text: #1a1d2e;
    --text2: #4a5068;
    --text3: #9099b5;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Arabic', 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,77,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,77,232,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Header */
  .page-header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-top: 1rem;
  }
  .page-header .tag {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid rgba(124,106,247,0.3);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 1rem;
  }
  .page-header h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .page-header p {
    font-size: 14px;
    color: var(--text2);
  }

  /* Progress */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--teal));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    font-weight: 500;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
  }
  .stat-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .stat-pill.correct { border-color: rgba(81,207,102,0.25); color: var(--green); background: var(--green-soft); }
  .stat-pill.wrong { border-color: rgba(255,107,107,0.25); color: var(--red); background: var(--red-soft); }
  .stat-pill.pending { border-color: rgba(124,106,247,0.2); }
  .stat-pill.correct .dot { background: var(--green); }
  .stat-pill.wrong .dot { background: var(--red); }
  .stat-pill.pending .dot { background: var(--accent); }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem 2rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.3s ease;
    transition: border-color 0.3s;
  }
  .q-card:hover { border-color: var(--border-hover); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-badges {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .q-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid rgba(124,106,247,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--accent);
    flex-shrink: 0;
  }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid transparent;
  }
  .badge-topic { background: var(--teal-soft); color: var(--teal); border-color: rgba(56,217,169,0.2); }
  .badge-skill { background: var(--amber-soft); color: var(--amber); border-color: rgba(255,184,77,0.2); }

  /* Context box */
  .context-box {
    background: var(--surface2);
    border-right: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text2);
  }
  .context-box .context-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .q-text {
    font-size: 15.5px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1.5rem;
    font-weight: 500;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    text-align: right;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .opt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-soft);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .opt:hover:not(:disabled)::before { opacity: 1; }
  .opt:hover:not(:disabled) { border-color: rgba(124,106,247,0.4); }
  .opt:disabled { cursor: not-allowed; }

  .opt.correct {
    background: var(--green-soft);
    border-color: rgba(81,207,102,0.4);
  }
  .opt.wrong {
    background: var(--red-soft);
    border-color: rgba(255,107,107,0.4);
  }
  .opt.neutral-correct {
    background: var(--green-soft);
    border-color: rgba(81,207,102,0.2);
    opacity: 0.7;
  }

  .opt-letter {
    min-width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: var(--text2);
    flex-shrink: 0;
    transition: all 0.2s;
    position: relative; z-index: 1;
  }
  .opt.correct .opt-letter { background: var(--green); border-color: var(--green); color: #fff; }
  .opt.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }
  .opt.neutral-correct .opt-letter { background: var(--green); border-color: var(--green); color: #fff; }

  .opt-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    padding-top: 4px;
    position: relative; z-index: 1;
  }
  .opt.correct .opt-text { color: var(--green); }
  .opt.wrong .opt-text { color: var(--red); }
  .opt.neutral-correct .opt-text { color: var(--green); opacity: 0.8; }

  /* Feedback panel */
  .feedback-panel {
    margin-top: 1.25rem;
    border-radius: var(--radius-sm);
    overflow: hidden;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .feedback-panel.show { display: block; }

  .feedback-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 10px;
  }
  .feedback-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .feedback-panel.panel-correct { background: rgba(81,207,102,0.06); border: 1px solid rgba(81,207,102,0.2); }
  .feedback-panel.panel-wrong { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.2); }
  .feedback-panel.panel-correct .feedback-icon { background: var(--green-soft); color: var(--green); }
  .feedback-panel.panel-wrong .feedback-icon { background: var(--red-soft); color: var(--red); }
  .feedback-title {
    font-size: 14px;
    font-weight: 600;
  }
  .feedback-panel.panel-correct .feedback-title { color: var(--green); }
  .feedback-panel.panel-wrong .feedback-title { color: var(--red); }

  .feedback-body { padding: 0 16px 16px; }

  /* Solution steps */
  .solution-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .step-num {
    min-width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: var(--text3);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .step-text {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text2);
  }
  .step-text strong { color: var(--text); font-weight: 600; }
  .step-text .formula {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 8px;
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    color: #7c3f00;
    margin: 2px 0;
    direction: ltr;
  }

  .answer-highlight {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border-right: 3px solid var(--green);
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.6;
  }
  .answer-highlight strong { color: var(--green); }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 0.5rem;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.2s;
    font-weight: 500;
  }
  .nav-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--border-hover); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .nav-btn.primary:hover:not(:disabled) { background: #6b5ce7; }

  .nav-center { font-size: 13px; color: var(--text3); }

  /* Score screen */
  .score-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 3rem 2rem;
    animation: fadeUp 0.5s ease;
  }
  .score-screen.show { display: flex; }

  .score-ring {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 3px solid var(--accent);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
    box-shadow: 0 0 40px var(--accent-glow);
  }
  .score-num { font-size: 42px; font-weight: 700; color: var(--accent); line-height: 1; }
  .score-denom { font-size: 14px; color: var(--text2); margin-top: 2px; }

  .score-grade {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .score-msg {
    font-size: 15px;
    color: var(--text2);
    max-width: 440px;
    line-height: 1.65;
    margin-bottom: 2rem;
  }

  .score-breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 2rem;
  }
  .breakdown-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
  }
  .breakdown-val { font-size: 26px; font-weight: 600; }
  .breakdown-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .breakdown-card.c { border-color: rgba(81,207,102,0.25); }
  .breakdown-card.c .breakdown-val { color: var(--green); }
  .breakdown-card.w { border-color: rgba(255,107,107,0.25); }
  .breakdown-card.w .breakdown-val { color: var(--red); }
  .breakdown-card.p { border-color: rgba(124,106,247,0.25); }
  .breakdown-card.p .breakdown-val { color: var(--accent); }

  .q-dots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2rem;
    max-width: 400px;
  }
  .q-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    border: 1px solid transparent;
  }
  .q-dot.c { background: var(--green-soft); border-color: rgba(81,207,102,0.3); color: var(--green); }
  .q-dot.w { background: var(--red-soft); border-color: rgba(255,107,107,0.3); color: var(--red); }

  .restart-btn {
    padding: 12px 36px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .restart-btn:hover { background: #6b5ce7; transform: translateY(-1px); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }

  @media (max-width: 600px) {
    .page-wrap { padding: 1.25rem 1rem 3rem; }
    .q-card { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="page-header">
    <div class="tag">NSMO Chemistry</div>
    <h1>الغازات — مستوى الأولمبياد</h1>
    <p>١٠ أسئلة تحليلية مع تغذية راجعة وشرح تفصيلي لكل إجابة</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:10%"></div></div>
    <span class="progress-label" id="prog-label">1 / 10</span>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-pill pending"><span class="dot"></span><span id="stat-remaining">10 متبقية</span></div>
    <div class="stat-pill correct" id="stat-correct-pill" style="display:none"><span class="dot"></span><span id="stat-correct">0 صحيح</span></div>
    <div class="stat-pill wrong" id="stat-wrong-pill" style="display:none"><span class="dot"></span><span id="stat-wrong">0 خطأ</span></div>
  </div>

  <div id="quiz-area"></div>

  <div class="nav" id="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)" disabled>→ السابق</button>
    <span class="nav-center" id="nav-label">السؤال 1 من 10</span>
    <button class="nav-btn" id="next-btn" onclick="go(1)" disabled>التالي ←</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="score-ring">
      <div class="score-num" id="sc-num">0</div>
      <div class="score-denom">من 10</div>
    </div>
    <div class="score-grade" id="sc-grade"></div>
    <div class="score-msg" id="sc-msg"></div>
    <div class="score-breakdown">
      <div class="breakdown-card c"><div class="breakdown-val" id="sc-correct">0</div><div class="breakdown-label">إجابات صحيحة</div></div>
      <div class="breakdown-card w"><div class="breakdown-val" id="sc-wrong">0</div><div class="breakdown-label">إجابات خاطئة</div></div>
      <div class="breakdown-card p"><div class="breakdown-val" id="sc-pct">0%</div><div class="breakdown-label">نسبة الإتقان</div></div>
    </div>
    <div class="q-dots" id="sc-dots"></div>
    <button class="restart-btn" onclick="restart()">إعادة المحاولة من البداية</button>
  </div>

</div>

<script>
const QUESTIONS = [
  {
    topic: "قانون جراهام",
    skill: "تحليل كمي",
    context: "في مختبر الكيمياء، وضع الطالب عمر عينتين من غازَين مجهولَي الهوية في جهاز قياس التدفق عند درجة حرارة ثابتة 25°م. لاحظ أن الغاز الأول يتدفق بمعدل 3 مل/ث، في حين يتدفق الغاز الثاني بمعدل 12 مل/ث.",
    q: "إذا علمت أن أحد هذين الغازين هو ثاني أكسيد الكبريت SO₂ (الكتلة المولية 64 جم/مول)، فما الكتلة المولية للغاز الآخر؟",
    opts: ["4 جم/مول", "8 جم/مول", "16 جم/مول", "256 جم/مول"],
    ans: 0,
    feedback_correct: "ممتاز! تطبيق صحيح تام لقانون جراهام.",
    feedback_wrong: "تذكّر أن نسبة المعدلين تُعطينا الجذر التربيعي لنسبة الكتل المولية المعكوسة.",
    steps: [
      { text: "اكتب صيغة قانون جراهام: <span class='formula'>(Rate A / Rate B) = √(M_B / M_A)</span>" },
      { text: "عيّن القيم: معدل الغاز السريع = 12، معدل الغاز البطيء (SO₂) = 3، كتلة SO₂ = 64 جم/مول." },
      { text: "احسب النسبة: <span class='formula'>12 / 3 = 4</span>" },
      { text: "طبّق القانون: <span class='formula'>4 = √(64 / M_unknown)</span>" },
      { text: "ربّع الطرفين: <span class='formula'>16 = 64 / M</span>، إذن <span class='formula'>M = 64 / 16 = 4 جم/مول</span>" },
    ],
    answer_note: "الغاز المجهول كتلته المولية 4 جم/مول وهو غاز الهيليوم He، وهو منطقي لأن الهيليوم الأخف يتدفق أسرع بكثير من SO₂ الأثقل."
  },
  {
    topic: "نظرية الحركة الجزيئية",
    skill: "استنباط مفاهيمي",
    context: "درست الطالبة ليلى تجربة تصادم جسيمات الغاز. وجدت أن عينتين من غازَي النيتروجين N₂ (28 جم/مول) والهيدروجين H₂ (2 جم/مول) عند درجة حرارة 300 كلفن لهما متوسط طاقة حركية متماثل.",
    q: "ما الاستنتاج الصحيح الذي يمكن استخلاصه من هذه الملاحظة؟",
    opts: [
      "جزيئات N₂ وH₂ تتحرك بالسرعة المتجهة نفسها",
      "جزيئات H₂ الأخف تتحرك بسرعة متجهة متوسطة أعلى بكثير من جزيئات N₂",
      "درجة الحرارة لا تؤثر في متوسط الطاقة الحركية",
      "جزيئات N₂ الأثقل لها طاقة حركية فردية أعلى لأن كتلتها أكبر"
    ],
    ans: 1,
    feedback_correct: "تحليل ممتاز! استوعبت العلاقة بين الكتلة والسرعة عند ثبات الطاقة الحركية.",
    feedback_wrong: "تذكّر: KE = ½mv². إذا كان KE متساوياً لكلا الغازين، فإن الغاز الأخف يجب أن يمتلك سرعة أعلى.",
    steps: [
      { text: "معادلة الطاقة الحركية: <span class='formula'>KE = ½mv²</span>" },

let cur = 0;

function render() {
  const q = QUESTIONS[cur];

  document.getElementById('prog').style.width = ((cur+1)/QUESTIONS.length*100) + '%';
  document.getElementById('prog-label').textContent = `${cur+1} / ${QUESTIONS.length}`;
  document.getElementById('nav-label').textContent = `السؤال ${cur+1} من ${QUESTIONS.length}`;
  document.getElementById('prev-btn').disabled = cur === 0;
  const isLast = cur === QUESTIONS.length - 1;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.disabled = !answered;
  nextBtn.textContent = (isLast && answered) ? 'عرض النتيجة النهائية ←' : 'التالي ←';
  nextBtn.className = (isLast && answered) ? 'nav-btn primary' : 'nav-btn';

      <span class="badge badge-topic">${q.topic}</span>
      <span class="badge badge-skill">${q.skill}</span>
    </div>`;

  if (q.context) {
    html += `<div class="context-box">
      <div class="context-label">سياق المسألة</div>
      ${q.context}
    </div>`;
  }

  html += `<div class="q-text">${q.q}</div>
    <div class="options">`;

  q.opts.forEach((opt, i) => {
    let cls = 'opt';
    if (answered) {
      if (i === q.ans) cls += ' neutral-correct';
      if (i === answers[cur] && i === q.ans) cls = 'opt correct';
      if (i === answers[cur] && i !== q.ans) cls += ' wrong';
    }
    html += `<button class="${cls}" onclick="pick(${i})" ${answered ? 'disabled' : ''}>
      <div class="opt-letter">${LETTERS[i]}</div>
      <div class="opt-text">${opt}</div>
    </button>`;
  });

  html += `</div>`;

  if (answered) {
    const isCorrect = answers[cur] === q.ans;
    html += `<div class="feedback-panel show ${isCorrect ? 'panel-correct' : 'panel-wrong'}">
      <div class="feedback-header">
        <div class="feedback-icon">${isCorrect ? '✓' : '✗'}</div>
        <div class="feedback-title">${isCorrect ? q.feedback_correct : q.feedback_wrong}</div>
      </div>
      <div class="feedback-body">
        <div class="divider"></div>
        <div style="font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;">طريقة الحل خطوة بخطوة</div>
        <div class="solution-steps">`;
    q.steps.forEach((s, i) => {
      html += `<div class="step">
        <div class="step-num">${i+1}</div>
        <div class="step-text">${s.text}</div>
      </div>`;
    });
    html += `</div>`;
    if (q.answer_note) {
      html += `<div class="answer-highlight"><strong>الإجابة والتحليل: </strong>${q.answer_note}</div>`;
    }
    html += `</div></div>`;
  }

  html += `</div>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function pick(i) {
  if (answers[cur] !== null) return;
  answers[cur] = i;
  render();
}

function go(dir) {
  if (dir === 1 && cur === QUESTIONS.length - 1 && answers[cur] !== null) {
    showScore(); return;
  }
  cur = Math.max(0, Math.min(QUESTIONS.length - 1, cur + dir));
  render();
}

function updateStats() {
  const answered = answers.filter(a => a !== null).length;
  const correct = answers.filter((a,i) => a === QUESTIONS[i].ans).length;
  const wrong = answered - correct;
  const remaining = QUESTIONS.length - answered;

  document.getElementById('stat-remaining').textContent = `${remaining} متبقية`;
  if (correct > 0) {
    document.getElementById('stat-correct-pill').style.display = 'flex';
    document.getElementById('stat-correct').textContent = `${correct} صحيح`;
  }
  if (wrong > 0) {
    document.getElementById('stat-wrong-pill').style.display = 'flex';
    document.getElementById('stat-wrong').textContent = `${wrong} خطأ`;
  }
}

function showScore() {
  const score = answers.filter((a,i) => a === QUESTIONS[i].ans).length;
  const wrong = QUESTIONS.length - score;
  const pct = Math.round(score / QUESTIONS.length * 100);

  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('nav-bar').style.display = 'none';
  document.getElementById('stats-bar').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';
  document.querySelector('.page-header').style.display = 'none';

  const grades = [
    [0, 3,  'يحتاج مراجعة شاملة', 'راجع مادة الغازات من البداية مع التركيز على نظرية الحركة الجزيئية وقانون جراهام.'],
    [4, 5,  'مستوى مقبول', 'أساس جيد! راجع الأسئلة الخاطئة وتدرّب على المسائل الحسابية أكثر.'],
    [6, 7,  'مستوى جيد', 'أداء جيد. تدرّب على مزيد من المسائل التطبيقية لترسيخ الفهم.'],
    [8, 9,  'مستوى متميز', 'تقريباً كامل! راجع الخطأ أو الخطأين وستكون جاهزاً للمنافسة.'],
    [10, 10,'مستوى الأولمبياد', 'إجابات كاملة! أنت مؤهل حقاً للمنافسة في الأولمبياد الكيميائي.']
  ];
  const [, , grade, msg] = grades.find(([lo, hi]) => score >= lo && score <= hi);

  document.getElementById('sc-num').textContent = score;
  document.getElementById('sc-grade').textContent = grade;
  document.getElementById('sc-msg').textContent = msg;
  document.getElementById('sc-correct').textContent = score;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-pct').textContent = pct + '%';

  let dots = '';
  answers.forEach((a, i) => {
    const c = a === QUESTIONS[i].ans ? 'c' : 'w';
    dots += `<div class="q-dot ${c}">${i+1}</div>`;
  });
  document.getElementById('sc-dots').innerHTML = dots;

  document.getElementById('score-screen').classList.add('show');
}

function restart() {
  cur = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  ['quiz-area','nav-bar','stats-bar'].forEach(id => document.getElementById(id).style.display = '');
  document.querySelector('.progress-wrap').style.display = '';
  document.querySelector('.page-header').style.display = '';
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('stat-correct-pill').style.display = 'none';
  document.getElementById('stat-wrong-pill').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
